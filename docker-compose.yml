version: "3.9"

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - internal

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: .env
    volumes:
      - ./certs:/app/certs:ro
      - audit_tmp:/tmp/monkey365
      - db_data:/app/data
    depends_on:
      - redis
    networks:
      - internal
    restart: unless-stopped

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    env_file: .env
    volumes:
      - ./certs:/app/certs:ro
      - audit_tmp:/tmp/monkey365
      - db_data:/app/data
    depends_on:
      - redis
    networks:
      - internal
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    networks:
      - internal
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - api
      - frontend
    networks:
      - internal
    restart: unless-stopped

networks:
  internal:
    driver: bridge

volumes:
  audit_tmp:
  db_data:
